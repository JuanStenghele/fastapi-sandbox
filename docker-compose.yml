services:
  api:
    container_name: fastapi-sandbox
    depends_on:
      postgres:
        condition: service_started
      db-migrations-job:
        condition: service_completed_successfully
    build:
      context: ./
    volumes:
      - ./src:/fastapi-sandbox/src
    ports:
      - 8000:8000
    restart: on-failure:5
    env_file:
      - .env

  db-migrations-job:
    container_name: fastapi-sandbox-db-migrations-job
    depends_on:
      postgres:
        condition: service_started
    build:
      context: ./
    command: /fastapi-sandbox/scripts/run_migrations.sh
    restart: "no"
    env_file:
      - .env
    environment:
      DB_MIGRATION_RETRIES: 5
      DB_MIGRATION_SLEEP: 2

  postgres:
    container_name: postgres
    image: 'postgres:18.2-alpine'
    ports:
      - 5432:5432
    env_file:
      - .env
    volumes:
      - db-v18:/var/lib/postgresql

  otel-collector:
    container_name: otel-collector
    image: 'otel/opentelemetry-collector-contrib:0.115.1'
    volumes:
      - ./metrics/otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - 4317:4317  # gRPC receiver
      - 4318:4318  # HTTP receiver
    depends_on:
      - prometheus
    restart: unless-stopped

  prometheus:
    container_name: prometheus
    image: 'prom/prometheus:v3'
    ports:
      - 9090:9090
    volumes:
      - ./metrics/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
      - '--web.enable-otlp-receiver'
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: 'grafana/grafana:11.5.0'
    depends_on:
      - prometheus
    ports:
      - 3000:3000
    env_file:
      - .env
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true # Allow access without login
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin # Role assigned to anonymous users
    volumes:
      - ./metrics/grafana:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  db-v18:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
