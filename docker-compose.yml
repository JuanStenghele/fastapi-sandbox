services:
  api:
    container_name: fastapi-sandbox
    depends_on:
      postgres:
        condition: service_started
      db-migrations-job:
        condition: service_completed_successfully
      mock-oauth2-server:
        condition: service_started
      minio:
        condition: service_started
    build:
      context: ./
    volumes:
      - ./src:/fastapi-sandbox/src
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: on-failure:5
    env_file:
      - .env

  mock-oauth2-server:
    container_name: mock-oauth2-server
    image: 'ghcr.io/navikt/mock-oauth2-server:3.0.1'
    ports:
      - 8080:8080
    volumes:
      - ./config/local/mock-oauth2-server/config.json:/etc/mock-oauth2-server/config.json
    environment:
      SERVER_NAME: http://localhost:8080
      JSON_CONFIG_PATH: /etc/mock-oauth2-server/config.json

  db-migrations-job:
    container_name: fastapi-sandbox-db-migrations-job
    depends_on:
      postgres:
        condition: service_started
    build:
      context: ./
    command: /fastapi-sandbox/scripts/run_migrations.sh
    restart: "no"
    env_file:
      - .env
    environment:
      DB_MIGRATION_RETRIES: 5
      DB_MIGRATION_SLEEP: 2

  postgres:
    container_name: postgres
    image: 'postgres:18.2-alpine'
    ports:
      - 5432:5432
    env_file:
      - .env
    volumes:
      - db-v18:/var/lib/postgresql

  minio:
    container_name: minio
    image: 'minio/minio:RELEASE.2025-09-07T16-13-09Z'
    ports:
      - 9000:9000
      - 9001:9001
    env_file:
      - .env
    entrypoint: /scripts/run_minio.sh
    volumes:
      - minio-data:/data
      - ./scripts/local/run_minio.sh:/scripts/run_minio.sh

  loki:
    container_name: loki
    image: 'grafana/loki:3.7.2'
    ports:
      - 3100:3100
    volumes:
      - ./config/local/loki/loki-config.yml:/etc/loki/loki-config.yml
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    env_file:
      - .env
    depends_on:
      - minio
    restart: unless-stopped

  tempo:
    container_name: tempo
    image: 'grafana/tempo:2.10.6'
    ports:
      - 3200:3200
    volumes:
      - ./config/local/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml
    command: -config.file=/etc/tempo/tempo-config.yml -config.expand-env=true
    env_file:
      - .env
    depends_on:
      - minio
    restart: unless-stopped

  otel-collector:
    container_name: otel-collector
    image: 'otel/opentelemetry-collector-contrib:0.115.1'
    volumes:
      - ./config/local/otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - 4317:4317  # gRPC receiver
      - 4318:4318  # HTTP receiver
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  prometheus:
    container_name: prometheus
    image: 'prom/prometheus:v3'
    ports:
      - 9090:9090
    volumes:
      - ./config/local/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
      - '--web.enable-otlp-receiver'
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: 'grafana/grafana:11.5.0'
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - 3000:3000
    env_file:
      - .env
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true # Allow access without login
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin # Role assigned to anonymous users
    volumes:
      - ./config/local/grafana:/etc/grafana/provisioning
      - ./helm/files/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

volumes:
  db-v18:
    driver: local
  minio-data:
    driver: local
  prometheus-data:
    driver: local
