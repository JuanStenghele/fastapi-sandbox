ingressRoute:
  dashboard:
    enabled: false

ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

persistence:
  enabled: true
  size: 128Mi
  storageClass: gp2

deployment:
  initContainers:
    - name: volume-permissions
      image: busybox:latest
      command: ["sh", "-c", "touch /data/acme.json && chmod 600 /data/acme.json"]
      volumeMounts:
        - name: data
          mountPath: /data

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /data/acme.json
      httpChallenge:
        entryPoint: web
