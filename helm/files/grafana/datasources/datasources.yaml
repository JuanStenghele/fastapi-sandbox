apiVersion: 1

datasources:
  - name: Metrics
    type: prometheus
    uid: prometheus
    access: proxy
    url: {{ .Values.prometheus.url }}
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "1m"

  - name: Logs
    type: loki
    uid: loki
    access: proxy
    url: {{ .Values.loki.url }}
    editable: true

  - name: DB
    type: postgres
    url: ${POSTGRES_HOST}:${POSTGRES_PORT}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: ${POSTGRES_SSLMODE}
    editable: true
