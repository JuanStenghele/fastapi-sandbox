{{- if .Values.ingress.headlamp }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp-ingress-route
spec:
  entryPoints:
    - {{ if .Values.ingress.tls }}websecure{{ else }}web{{ end }}
  routes:
    - match: Host(`{{ .Values.ingress.headlamp }}`) || Host(`www.{{ .Values.ingress.headlamp }}`)
      kind: Rule
      services:
        - name: headlamp-service
          port: {{ .Values.headlamp.port }}
{{- if .Values.ingress.tls }}
  tls:
    certResolver: letsencrypt
{{- end }}
{{- end }}
