{{- if eq .Values.env.ENV "local" }}
apiVersion: v1
kind: Secret
metadata:
  name: minio-secrets
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.secrets.minioRootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minioRootPassword | quote }}
  STORAGE_BUCKET_NAME: {{ .Values.secrets.storageBucketName | quote }}
  OBSERVABILITY_BUCKET_NAME: {{ .Values.secrets.observabilityBucketName | quote }}
{{- end }}
