{{- if eq .Values.env.ENV "local" }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: default
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: {{ .Values.secrets.grafanaAdminUser | quote }}
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.secrets.grafanaPassword | quote }}
{{- end }}
