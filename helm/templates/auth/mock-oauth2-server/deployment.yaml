{{- if eq .Values.env.ENV "local" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oauth2-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-oauth2-server
  template:
    metadata:
      labels:
        app: mock-oauth2-server
    spec:
      containers:
      - name: mock-oauth2-server
        image: ghcr.io/navikt/mock-oauth2-server:3.0.1
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "http://mock-oauth2-server:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
{{- end }}
