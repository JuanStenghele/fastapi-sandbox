{{- if .Values.ingress.api }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api-ingress-route
spec:
  entryPoints:
    - {{ if .Values.ingress.tls }}websecure{{ else }}web{{ end }}
  routes:
    - match: Host(`{{ .Values.ingress.api }}`) || Host(`www.{{ .Values.ingress.api }}`)
      kind: Rule
      services:
        - name: fastapi-sandbox-service
          port: 80
{{- if .Values.ingress.tls }}
  tls:
    certResolver: letsencrypt
{{- end }}
{{- end }}
