apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-sandbox-config-map
data:
  ENV: {{ .Values.env.ENV | quote }}
  PORT: {{ .Values.env.PORT | quote }}
  POSTGRES_SSLMODE: {{ .Values.env.POSTGRES_SSLMODE | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
  AUTH_ISSUER: {{ .Values.env.AUTH_ISSUER | quote }}
  AUTH_AUDIENCE: {{ .Values.env.AUTH_AUDIENCE | quote }}
  AUTH_JWKS_URI: {{ .Values.env.AUTH_JWKS_URI | quote }}
  STORAGE_PUBLIC_URL: {{ .Values.env.STORAGE_PUBLIC_URL | quote }}
  STORAGE_SERVICE_URL: {{ .Values.env.STORAGE_SERVICE_URL | quote }}
