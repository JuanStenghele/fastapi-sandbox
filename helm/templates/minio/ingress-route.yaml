{{- if and (eq .Values.env.ENV "local") .Values.ingress .Values.ingress.domain }}
{{- $host := printf "%s.%s" .Values.ingress.subdomains.storage .Values.ingress.domain }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-ingress-route
spec:
  entryPoints:
    - {{ if .Values.ingress.tls }}websecure{{ else }}web{{ end }}
  routes:
    - match: Host(`{{ $host }}`) || Host(`www.{{ $host }}`)
      kind: Rule
      services:
        - name: minio
          port: 9000
{{- if .Values.ingress.tls }}
  tls:
    certResolver: letsencrypt
{{- end }}
{{- end }}
