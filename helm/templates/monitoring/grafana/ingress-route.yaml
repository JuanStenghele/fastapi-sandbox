{{- if .Values.ingress.grafana }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-ingress-route
spec:
  entryPoints:
    - {{ if .Values.ingress.tls }}websecure{{ else }}web{{ end }}
  routes:
    - match: Host(`{{ .Values.ingress.grafana }}`) || Host(`www.{{ .Values.ingress.grafana }}`)
      kind: Rule
      services:
        - name: grafana-service
          port: {{ .Values.grafana.port }}
{{- if .Values.ingress.tls }}
  tls:
    certResolver: letsencrypt
{{- end }}
{{- end }}
