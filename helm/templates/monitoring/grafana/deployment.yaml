apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
spec:
  replicas: {{ .Values.replicaCount.grafana }}
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml .Values.env | sha256sum }}
        checksum/datasources: {{ .Files.Get "files/grafana/datasources/datasources.yaml" | sha256sum }}{{ toYaml (.Values.prometheus | default dict) | sha256sum }}{{ toYaml (.Values.loki | default dict) | sha256sum }}{{ toYaml (.Values.tempo | default dict) | sha256sum }}
        checksum/dashboards-provisioning: {{ .Files.Get "files/grafana/dashboards/dashboards-provisioning.yaml" | sha256sum }}
        checksum/dashboards: {{ .Files.Get "files/grafana/dashboards/fastapi-service.json" | sha256sum }}{{ .Files.Get "files/grafana/dashboards/endpoint-overview.json" | sha256sum }}
        checksum/secret: {{ toYaml .Values.secrets | sha256sum }}
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.5.0
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: fastapi-sandbox-secrets
        - secretRef:
            name: grafana-secrets
        - configMapRef:
            name: fastapi-sandbox-config-map
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboards-provisioning
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-dashboards
          mountPath: /var/lib/grafana/dashboards
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
      volumes:
      - name: grafana-storage
        emptyDir: {}
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-dashboards-provisioning
        configMap:
          name: grafana-dashboards-provisioning
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards
