name: Terraform Infrastructure

on:
  workflow_dispatch

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_rds_username: ${{ secrets.POSTGRES_USER }}
  TF_VAR_rds_password: ${{ secrets.POSTGRES_PASSWORD }}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/infrastructure
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-tfplan
          path: terraform/infrastructure/tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    environment: aws-infrastructure
    defaults:
      run:
        working-directory: terraform/infrastructure
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: infrastructure-tfplan
          path: terraform/infrastructure

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
