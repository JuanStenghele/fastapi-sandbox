name: CI/CD Pipeline

on:
  workflow_dispatch

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r test/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest test -v --cov=src --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  build:
    name: Build
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/juans-fastapi-sandbox:latest .

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/juans-fastapi-sandbox:latest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name juans-fastapi-sandbox-eks --region ${{ vars.AWS_REGION }}

      - name: Verify kubectl connection
        run: |
          kubectl cluster-info

      - name: Populate secrets
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          for template in helm/secrets/*.template.yaml; do
            envsubst < "$template" | kubectl apply -f -
          done

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Deploy Traefik
        run: |
          helm repo add traefik https://helm.traefik.io/traefik
          helm upgrade --install traefik traefik/traefik -f helm/values.traefik.yaml --set certificatesResolvers.letsencrypt.acme.email=${{ secrets.LETSENCRYPT_EMAIL }} --wait --timeout 5m

      - name: Deploy application
        run: |
          helm upgrade --install fastapi-sandbox helm/ -f helm/values.yaml -f helm/values.prod.yaml --wait --timeout 5m
          DEPLOYMENTS=$(kubectl get deployments -o name)
          kubectl rollout restart $DEPLOYMENTS
          for deployment in $DEPLOYMENTS; do
            kubectl rollout status $deployment --timeout=300s &
          done
          wait

      - name: Health check
        run: |
          HOSTNAME=$(kubectl get service fastapi-sandbox-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl --fail --retry 10 --retry-delay 5 --retry-connrefused "http://$HOSTNAME/v1/health-check"
