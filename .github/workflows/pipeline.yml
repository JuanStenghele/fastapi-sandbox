name: CI/CD Pipeline

on:
  workflow_dispatch

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r test/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest test -v --cov=src --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  build:
    name: Build
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/juans-fastapi-sandbox:latest .

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/juans-fastapi-sandbox:latest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name juans-fastapi-sandbox-eks --region ${{ vars.AWS_REGION }}

      - name: Verify kubectl connection
        run: |
          kubectl cluster-info

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Deploy External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          ESO_ROLE_ARN=$(aws ssm get-parameter --name "/juans-fastapi-sandbox/eso/iam_role_arn" --query "Parameter.Value" --output text)          
          helm upgrade --install external-secrets external-secrets/external-secrets \
            -n external-secrets --create-namespace \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$ESO_ROLE_ARN \
            --wait --timeout 5m

      - name: Deploy Traefik
        run: |
          helm repo add traefik https://helm.traefik.io/traefik
          LETSENCRYPT_EMAIL=$(aws ssm get-parameter --name "/juans-fastapi-sandbox/letsencrypt/email" --with-decryption --query "Parameter.Value" --output text)
          helm upgrade --install traefik traefik/traefik -f helm/values.traefik.yaml --set certificatesResolvers.letsencrypt.acme.email=$LETSENCRYPT_EMAIL --wait --timeout 5m

      - name: Deploy application
        run: |
          helm dependency build helm/
          helm upgrade --install fastapi-sandbox helm/ -f helm/values.yaml -f helm/values.prod.yaml --wait --timeout 5m
          DEPLOYMENTS=$(kubectl get deployments -o name)
          kubectl rollout restart $DEPLOYMENTS
          for deployment in $DEPLOYMENTS; do
            kubectl rollout status $deployment --timeout=300s &
          done
          wait

      - name: Health check
        run: |
          TRAEFIK=$(kubectl get service traefik -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl --fail --retry 10 --retry-delay 5 --retry-connrefused --insecure -H "Host: juans-fastapi-sandbox.25101999.xyz" "https://$TRAEFIK/v1/health-check"
