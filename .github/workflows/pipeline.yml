name: CI/CD Pipeline

on:
  workflow_dispatch

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r test/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest test -v --cov=src --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  build:
    name: Build
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/juans-fastapi-sandbox:latest .

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/juans-fastapi-sandbox:latest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Log in to AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name juans-fastapi-sandbox-eks --region ${{ vars.AWS_REGION }}

      - name: Verify kubectl connection
        run: |
          kubectl cluster-info

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Helm lint
        run: |
          helm lint helm/ -f helm/values.yaml -f helm/values.prod.yaml -f helm/values.traefik.yaml -f helm/values.eso.yaml

      - name: Deploy application
        run: |
          helm dependency build helm/
          scripts/remote/helm_upgrade.sh

      - name: Health check
        run: |
          TRAEFIK=$(kubectl get service traefik -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          FULL_DOMAIN=$(kubectl get ingressroute api-ingress-route -o jsonpath='{.spec.routes[0].match}' | sed "s/.*Host(\`//;s/\`).*//")
          curl --fail --retry 10 --retry-delay 5 --retry-connrefused --insecure -H "Host: $FULL_DOMAIN" "https://$TRAEFIK/v1/health-check"
