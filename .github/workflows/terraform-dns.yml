name: Terraform DNS

on:
  workflow_dispatch

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/dns
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -message="Plan #${{ github.run_number }}"

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    environment: aws-dns
    defaults:
      run:
        working-directory: terraform/dns
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -message="Apply #${{ github.run_number }}"
