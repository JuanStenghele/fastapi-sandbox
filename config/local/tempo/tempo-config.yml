server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: s3
    s3:
      bucket: ${OBSERVABILITY_BUCKET_NAME}
      endpoint: minio:9000
      region: sa-east-1
      access_key: ${STORAGE_ACCESS_KEY_ID}
      secret_key: ${STORAGE_SECRET_ACCESS_KEY}
      insecure: true
      forcepathstyle: true
    wal:
      path: /var/tempo/wal
